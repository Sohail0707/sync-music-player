# Netlify build + functions configuration

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  # esbuild bundles node_modules (livekit-server-sdk) into the function automatically.
  node_bundler = "esbuild"

# Pretty alias: POST /api/get-token  ->  the serverless function.
# (The frontend uses this path; see fetchToken() in src/main.ts.)
[[redirects]]
  from = "/api/get-token"
  to = "/.netlify/functions/get-token"
  status = 200

# SPA fallback so the PWA deep-links resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
